version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sjk-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://sjk_user:sjk_pass@db:5432/sjk_db
    env_file:
      - .env
    networks:
      - sjk-network
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: sjk-db
    environment:
      - POSTGRES_USER=sjk_user
      - POSTGRES_PASSWORD=sjk_pass
      - POSTGRES_DB=sjk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sjk-network

  frontend:
    build: ./frontend
    container_name: sjk-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - sjk-network
    depends_on:
      - backend

networks:
  sjk-network:
    driver: bridge

volumes:
  postgres_data:
